spring.application.name=wrenchLog

# Primary Database
spring.datasource.url=jdbc:h2:mem:wrenchlog_app_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

custom.catalog.datasource.url=jdbc:sqlite:file:src/main/resources/catalog.db
custom.catalog.datasource.driver-class-name=org.sqlite.JDBC